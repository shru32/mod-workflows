<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOD Project Workflows</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f0; --text: #1a1a18; --text2: #6b6b66; --border: rgba(0,0,0,0.12);
  --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #CECBF6;
  --teal: #0F6E56; --teal-light: #E1F5EE; --teal-mid: #9FE1CB;
  --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #B5D4F4;
  --amber: #854F0B; --amber-light: #FAEEDA; --amber-mid: #FAC775;
  --coral: #993C1D; --coral-light: #FAECE7; --coral-mid: #F5C4B3;
  --pink: #993556; --pink-light: #FBEAF0; --pink-mid: #F4C0D1;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --text: #e8e6de; --text2: #9c9a92; --border: rgba(255,255,255,0.1);
    --purple-light: #26215C; --purple-mid: #3C3489;
    --teal-light: #04342C; --teal-mid: #085041;
    --blue-light: #042C53; --blue-mid: #0C447C;
    --amber-light: #412402; --amber-mid: #633806;
    --coral-light: #4A1B0C; --coral-mid: #712B13;
    --pink-light: #4B1528; --pink-mid: #72243E;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 32px 24px; max-width: 780px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

/* ── TYPE TABS ── */
.type-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.type-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer;
  transition: all .2s; white-space: nowrap; font-family: inherit; font-weight: 500;
}
.type-tab:hover { color: var(--text); border-color: rgba(0,0,0,0.2); }
.type-tab svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.type-tab.active { color: #fff; border-color: transparent; }
.type-tab[data-type="overarching"].active { background: var(--purple); }
.type-tab[data-type="print"].active       { background: var(--teal); }
.type-tab[data-type="web"].active         { background: var(--blue); }
.type-tab[data-type="email"].active       { background: var(--amber); }
.type-tab[data-type="postprod"].active    { background: var(--coral); }
.type-tab[data-type="live"].active        { background: var(--pink); }

/* ── TOGGLE ── */
.toggle-bar { display: none; align-items: center; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; width: fit-content; }
.toggle-bar.visible { display: flex; }
.toggle-btn { padding: 6px 18px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); font-family: inherit; transition: all .15s; }
.toggle-btn[data-view="internal"].active { background: var(--purple); color: #fff; }
.toggle-btn[data-view="external"].active { background: #1D9E75; color: #fff; }

/* ── PANEL WRAPPER ── */
.panel-wrap { position: relative; }

/* ── PANEL HEADER with left-border accent ── */
.flow-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; padding: 14px 16px;
  border-radius: 10px; background: var(--bg2);
  border-left: 4px solid var(--accent-color, #534AB7);
  gap: 12px;
}
.flow-header-text { flex: 1; }
.flow-title { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.flow-sub { font-size: 12px; color: var(--text2); }
.step-count {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--accent-color, #534AB7); color: #fff;
  border-radius: 8px; padding: 6px 12px; flex-shrink: 0; min-width: 56px;
  opacity: 0.9;
}
.step-count-num { font-size: 20px; font-weight: 600; line-height: 1; }
.step-count-label { font-size: 10px; opacity: 0.85; margin-top: 2px; letter-spacing: 0.03em; }

/* ── PHASE LABELS ── */
.phase-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text2); margin: 18px 0 6px 44px; opacity: 0.7;
}
.phase-label:first-child { margin-top: 0; }

/* ── STEPS ── */
.steps { display: flex; flex-direction: column; }
.step { display: flex; align-items: flex-start; gap: 12px; }
.step-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 32px; }

.step-icon-wrap {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px;
  transition: transform .15s;
}
.step-icon-wrap svg { width: 15px; height: 15px; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

/* Animated connector line */
.step-line {
  width: 2px; flex: 1; min-height: 10px;
  background: var(--line-color, #CECBF6);
  transform-origin: top;
  animation: drawLine 0.4s ease both;
}
@keyframes drawLine { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }
.step:last-child > .step-spine > .step-line { display: none; }

.step-body { padding: 6px 0 14px; flex: 1; min-width: 0; }

/* Expandable step header */
.step-trigger {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; gap: 8px; user-select: none;
}
.step-trigger:hover .step-label { opacity: 0.8; }
.step-label { font-size: 15px; font-weight: 500; line-height: 1.35; flex: 1; }
.step-chevron {
  width: 16px; height: 16px; flex-shrink: 0; opacity: 0.35;
  transition: transform .2s, opacity .2s;
  fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}
.step.open .step-chevron { transform: rotate(180deg); opacity: 0.6; }

/* Expandable content */
.step-expand {
  overflow: hidden; max-height: 0;
  transition: max-height 0.28s ease, opacity 0.2s ease;
  opacity: 0;
}
.step.open .step-expand { max-height: 400px; opacity: 1; }
.step-expand-inner { padding-top: 6px; }
.step-note { font-size: 12px; color: var(--text2); line-height: 1.55; }
.opt { font-weight: 400; font-size: 11px; color: var(--text2); }

/* Sub-steps */
.sub-steps { display: flex; flex-direction: column; margin: 8px 0 2px 0; padding-left: 10px; border-left: 2px dashed var(--line-color, #CECBF6); }
.sub-step { display: flex; align-items: flex-start; gap: 7px; padding: 3px 0; }
.sub-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--accent-color, #534AB7); opacity: 0.5; }
.sub-label { font-size: 12px; color: var(--text2); line-height: 1.45; }

/* Color theming via CSS vars per panel */
.col-purple { --accent-color: var(--purple); --icon-bg: var(--purple-light); --icon-stroke: var(--purple); --line-color: var(--purple-mid); }
.col-teal   { --accent-color: var(--teal);   --icon-bg: var(--teal-light);   --icon-stroke: var(--teal);   --line-color: var(--teal-mid);   }
.col-blue   { --accent-color: var(--blue);   --icon-bg: var(--blue-light);   --icon-stroke: var(--blue);   --line-color: var(--blue-mid);   }
.col-amber  { --accent-color: var(--amber);  --icon-bg: var(--amber-light);  --icon-stroke: var(--amber);  --line-color: var(--amber-mid);  }
.col-coral  { --accent-color: var(--coral);  --icon-bg: var(--coral-light);  --icon-stroke: var(--coral);  --line-color: var(--coral-mid);  }
.col-pink   { --accent-color: var(--pink);   --icon-bg: var(--pink-light);   --icon-stroke: var(--pink);   --line-color: var(--pink-mid);   }

.step-icon-wrap { background: var(--icon-bg); }
.step-icon-wrap svg { stroke: var(--icon-stroke); }

/* Panel entrance animation */
.panel-wrap { animation: fadeSlide 0.25s ease both; }
@keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

function ic(name) { return IC[name] || IC.file; }
const chevron = `<svg class="step-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;

// ── STEP / PHASE BUILDERS ─────────────────────────────────────────────────────

let stepCounter = 0;

function phase(label) {
  return `<div class="phase-label">${label}</div>`;
}

function step(iconKey, label, detail, opt) {
  stepCounter++;
  const optHtml = opt ? ` <span class="opt">(${opt})</span>` : '';
  const detailHtml = detail ? `<div class="step-expand"><div class="step-expand-inner"><div class="step-note">${detail}</div></div></div>` : '';
  const hasDetail = !!detail;
  return `<div class="step" onclick="toggleStep(this)" style="cursor:${hasDetail?'pointer':'default'}">
    <div class="step-spine">
      <div class="step-icon-wrap">${ic(iconKey)}</div>
      <div class="step-line"></div>
    </div>
    <div class="step-body">
      <div class="step-trigger">
        <div class="step-label">${label}${optHtml}</div>
        ${hasDetail ? chevron : ''}
      </div>
      ${detailHtml}
    </div>
  </div>`;
}

function lastStep(iconKey, label, detail, opt) {
  stepCounter++;
  const optHtml = opt ? ` <span class="opt">(${opt})</span>` : '';
  const detailHtml = detail ? `<div class="step-expand"><div class="step-expand-inner"><div class="step-note">${detail}</div></div></div>` : '';
  const hasDetail = !!detail;
  return `<div class="step" onclick="toggleStep(this)" style="cursor:${hasDetail?'pointer':'default'}">
    <div class="step-spine">
      <div class="step-icon-wrap">${ic(iconKey)}</div>
    </div>
    <div class="step-body">
      <div class="step-trigger">
        <div class="step-label">${label}${optHtml}</div>
        ${hasDetail ? chevron : ''}
      </div>
      ${detailHtml}
    </div>
  </div>`;
}

function sub(items) {
  return '<div class="sub-steps">' + items.map(([t,o]) =>
    `<div class="sub-step"><div class="sub-dot"></div><div class="sub-label">${t}${o?` <span class="opt">(${o})</span>`:''}</div></div>`
  ).join('') + '</div>';
}

function stepWithSub(iconKey, label, note, subItems) {
  stepCounter++;
  const noteHtml = note ? `<p style="font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.5;">${note}</p>` : '';
  const inner = noteHtml + sub(subItems);
  return `<div class="step" onclick="toggleStep(this)" style="cursor:pointer">
    <div class="step-spine">
      <div class="step-icon-wrap">${ic(iconKey)}</div>
      <div class="step-line"></div>
    </div>
    <div class="step-body">
      <div class="step-trigger">
        <div class="step-label">${label}</div>
        ${chevron}
      </div>
      <div class="step-expand"><div class="step-expand-inner">${inner}</div></div>
    </div>
  </div>`;
}

// ── PANEL COLORS ──────────────────────────────────────────────────────────────
const COLOR = {
  overarching: 'col-purple',
  print:       'col-teal',
  web:         'col-blue',
  email:       'col-amber',
  postprod:    'col-coral',
  live:        'col-pink',
};

const ACCENT = {
  overarching: '#534AB7', print: '#0F6E56', web: '#185FA5',
  email: '#854F0B', postprod: '#993C1D', live: '#993556',
};

// ── TAB DEFINITIONS ───────────────────────────────────────────────────────────
const TABS = [
  { type: 'overarching', label: 'Overarching flow', icon: 'layers',  hasToggle: false },
  { type: 'print',       label: 'Print & digital',  icon: 'print',   hasToggle: true },
  { type: 'web',         label: 'Web',              icon: 'globe',   hasToggle: true },
  { type: 'email',       label: 'Email',            icon: 'mail',    hasToggle: true },
  { type: 'postprod',    label: 'Post-prod video',  icon: 'film',    hasToggle: true },
  { type: 'live',        label: 'Live shoot',       icon: 'camera',  hasToggle: true },
];

// ── STATE & RENDER ────────────────────────────────────────────────────────────
let currentType = 'overarching', currentView = 'internal';

function renderTabs() {
  const row = document.getElementById('type-row');
  row.innerHTML = TABS.map(t => `
    <button class="type-tab${t.type===currentType?' active':''}" data-type="${t.type}" onclick="selectType('${t.type}')">
      ${IC[t.icon]} ${t.label}
    </button>`).join('');
}

function renderPanel() {
  const panelId = currentType === 'overarching' ? 'overarching-internal' : `${currentType}-${currentView}`;
  const colClass = COLOR[currentType];
  const accent = ACCENT[currentType];
  const { html: stepsHtml, count } = buildPanel(panelId);

  const titles = {
    'overarching-internal': ['Overarching MOD/MODHealth project flow', 'High-level master process covering all project types'],
    'print-internal':  ['Print & digital — internal', 'Task-based workflow'],
    'print-external':  ['Print & digital — external', 'Status-based workflow'],
    'web-internal':    ['Web — internal', ''],
    'web-external':    ['Web — external', ''],
    'email-internal':  ['Email — internal', ''],
    'email-external':  ['Email — external', ''],
    'postprod-internal': ['Post-production video — internal', ''],
    'postprod-external': ['Post-production video — external', ''],
    'live-internal':   ['Live shoot — internal', ''],
    'live-external':   ['Live shoot — external', ''],
  };
  const [title, sub] = titles[panelId] || ['',''];
  const subHtml = sub ? `<div class="flow-sub">${sub}</div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="panel-wrap ${colClass}" style="--accent-color:${accent}">
      <div class="flow-header">
        <div class="flow-header-text">
          <div class="flow-title">${title}</div>
          ${subHtml}
        </div>
        <div class="step-count">
          <div class="step-count-num">${count}</div>
          <div class="step-count-label">steps</div>
        </div>
      </div>
      <div class="steps">${stepsHtml}</div>
    </div>`;
}

function selectType(type) {
  currentType = type; currentView = 'internal';
  renderTabs();
  const tab = TABS.find(t => t.type === type);
  const bar = document.getElementById('toggle-bar');
  if (tab && tab.hasToggle) {
    bar.classList.add('visible');
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === 'internal'));
  } else {
    bar.classList.remove('visible');
  }
  renderPanel();
}

function selectView(view) {
  currentView = view;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  renderPanel();
}

function toggleStep(el) {
  const expand = el.querySelector('.step-expand');
  if (!expand) return;
  el.classList.toggle('open');
}

window.addEventListener('DOMContentLoaded', () => {
  renderTabs();
  renderPanel();
});
</script>
