<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOD Project Workflows</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeede9; --text: #1a1a18; --text2: #6b6b66; --border: rgba(0,0,0,0.1);
  --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #CECBF6;
  --teal: #0F6E56;   --teal-light: #E1F5EE;   --teal-mid: #9FE1CB;
  --blue: #185FA5;   --blue-light: #E6F1FB;   --blue-mid: #B5D4F4;
  --amber: #854F0B;  --amber-light: #FAEEDA;  --amber-mid: #FAC775;
  --coral: #993C1D;  --coral-light: #FAECE7;  --coral-mid: #F5C4B3;
  --pink: #993556;   --pink-light: #FBEAF0;   --pink-mid: #F4C0D1;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b; --text: #e8e6de; --text2: #9c9a92; --border: rgba(255,255,255,0.09);
    --purple-light: #26215C; --purple-mid: #3C3489;
    --teal-light: #04342C;   --teal-mid: #085041;
    --blue-light: #042C53;   --blue-mid: #0C447C;
    --amber-light: #412402;  --amber-mid: #633806;
    --coral-light: #4A1B0C;  --coral-mid: #712B13;
    --pink-light: #4B1528;   --pink-mid: #72243E;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 28px 24px; max-width: 820px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text2); margin-bottom: 22px; }

/* ── TOP-LEVEL MODE TABS ── */
.mode-row { display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.mode-tab {
  padding: 9px 18px 10px; font-size: 13px; font-weight: 500; cursor: pointer;
  border: none; background: transparent; color: var(--text2); font-family: inherit;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  display: flex; align-items: center; gap: 7px;
}
.mode-tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.mode-tab:hover { color: var(--text); }
.mode-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

/* ── PROJECT TYPE SUB-TABS (Detailed view) ── */
.type-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.type-tab {
  display: flex; align-items: center; gap: 6px; padding: 7px 13px;
  border-radius: 20px; border: 1px solid var(--border); background: var(--bg2);
  color: var(--text2); font-size: 12px; cursor: pointer; transition: all .2s;
  white-space: nowrap; font-family: inherit; font-weight: 500;
}
.type-tab svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.type-tab:hover { color: var(--text); }
.type-tab.active { color: #fff; border-color: transparent; }
.type-tab[data-type="overarching"].active { background: var(--purple); }
.type-tab[data-type="print"].active       { background: var(--teal); }
.type-tab[data-type="web"].active         { background: var(--blue); }
.type-tab[data-type="email"].active       { background: var(--amber); }
.type-tab[data-type="postprod"].active    { background: var(--coral); }
.type-tab[data-type="live"].active        { background: var(--pink); }

/* ── TOGGLE ── */
.toggle-bar { display: none; align-items: center; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; width: fit-content; }
.toggle-bar.visible { display: flex; }
.toggle-btn { padding: 6px 18px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); font-family: inherit; transition: all .15s; }
.toggle-btn[data-view="internal"].active { background: var(--purple); color: #fff; }
.toggle-btn[data-view="external"].active { background: #1D9E75; color: #fff; }

/* ── PANEL HEADER ── */
.panel-wrap { animation: fadeSlide 0.22s ease both; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.flow-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; padding: 14px 16px; border-radius: 10px;
  background: var(--bg2); border-left: 4px solid var(--accent-color, var(--purple)); gap: 12px;
}
.flow-header-text { flex: 1; }
.flow-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.flow-sub { font-size: 12px; color: var(--text2); line-height: 1.5; }
.step-count { display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--accent-color, var(--purple)); color: #fff; border-radius: 8px; padding: 6px 12px; flex-shrink: 0; min-width: 56px; }
.step-count-num { font-size: 20px; font-weight: 600; line-height: 1; }
.step-count-label { font-size: 10px; opacity: 0.85; margin-top: 2px; letter-spacing: 0.04em; }

/* ── PHASE LABELS ── */
.phase-block { margin: 22px 0 0; }
.phase-block:first-child { margin-top: 0; }
.phase-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.phase-line { flex: 1; height: 1px; background: var(--border); }
.phase-name {
  font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--accent-color, var(--purple)); white-space: nowrap; opacity: 0.8;
}

/* ── STEPS ── */
.steps { display: flex; flex-direction: column; }
.step { display: flex; align-items: flex-start; gap: 12px; }
.step-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 32px; }
.step-icon-wrap { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px; background: var(--icon-bg, var(--purple-light)); transition: transform .15s; }
.step-icon-wrap svg { width: 15px; height: 15px; fill: none; stroke: var(--icon-stroke, var(--purple)); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.step-line { width: 2px; flex: 1; min-height: 10px; background: var(--line-color, var(--purple-mid)); transform-origin: top; animation: drawLine 0.35s ease both; }
@keyframes drawLine { from { transform:scaleY(0); opacity:0; } to { transform:scaleY(1); opacity:1; } }
.step:last-child > .step-spine > .step-line { display: none; }
.step-body { padding: 5px 0 14px; flex: 1; min-width: 0; }
.step-trigger { display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 8px; user-select: none; }
.step-label { font-size: 15px; font-weight: 500; line-height: 1.35; flex: 1; }
.opt { font-weight: 400; font-size: 11px; color: var(--text2); }
.step-chevron { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.3; transition: transform .2s, opacity .2s; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.step.open .step-chevron { transform: rotate(180deg); opacity: 0.6; }
.step-expand { overflow: hidden; max-height: 0; transition: max-height 0.28s ease, opacity 0.2s ease; opacity: 0; }
.step.open .step-expand { max-height: 500px; opacity: 1; }
.step-expand-inner { padding-top: 7px; }
.step-note { font-size: 12px; color: var(--text2); line-height: 1.6; }
.sub-steps { display: flex; flex-direction: column; margin: 8px 0 2px; padding-left: 10px; border-left: 2px dashed var(--line-color, var(--purple-mid)); }
.sub-step { display: flex; align-items: flex-start; gap: 7px; padding: 3px 0; }
.sub-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--accent-color, var(--purple)); opacity: 0.5; }
.sub-label { font-size: 12px; color: var(--text2); line-height: 1.45; }

/* ── COLOR THEMES ── */
.col-purple { --accent-color:var(--purple); --icon-bg:var(--purple-light); --icon-stroke:var(--purple); --line-color:var(--purple-mid); }
.col-teal   { --accent-color:var(--teal);   --icon-bg:var(--teal-light);   --icon-stroke:var(--teal);   --line-color:var(--teal-mid);   }
.col-blue   { --accent-color:var(--blue);   --icon-bg:var(--blue-light);   --icon-stroke:var(--blue);   --line-color:var(--blue-mid);   }
.col-amber  { --accent-color:var(--amber);  --icon-bg:var(--amber-light);  --icon-stroke:var(--amber);  --line-color:var(--amber-mid);  }
.col-coral  { --accent-color:var(--coral);  --icon-bg:var(--coral-light);  --icon-stroke:var(--coral);  --line-color:var(--coral-mid);  }
.col-pink   { --accent-color:var(--pink);   --icon-bg:var(--pink-light);   --icon-stroke:var(--pink);   --line-color:var(--pink-mid);   }

/* ── FULL SCOPE VIEW ── */
.scope-intro {
  background: var(--bg2); border-radius: 10px; padding: 16px 18px;
  margin-bottom: 24px; border-left: 4px solid var(--purple);
}
.scope-intro p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
.scope-intro p:last-child { margin-bottom: 0; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Scope step — universal vs specialty */
.scope-step { display: flex; align-items: flex-start; gap: 12px; }
.scope-step-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 32px; }
.scope-step-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 4px;
}
.scope-step-icon svg { width: 15px; height: 15px; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.scope-step-line { width: 2px; flex: 1; min-height: 10px; animation: drawLine 0.35s ease both; }
.scope-step:last-child .scope-step-line { display: none; }
.scope-step-body { padding: 5px 0 14px; flex: 1; min-width: 0; }
.scope-step-trigger { display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; gap: 10px; user-select: none; }
.scope-step-label { font-size: 15px; font-weight: 500; line-height: 1.35; flex: 1; }
.scope-step-label.universal { font-weight: 600; }

/* Type badges */
.type-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.type-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 400;
  opacity: 0.9;
}
.badge-all {
  background: var(--text); color: var(--bg); font-size: 10px; font-weight: 600;
  padding: 2px 9px; border-radius: 20px; letter-spacing: 0.03em; opacity: 0.85;
}
.badge-purple { background: rgba(83,74,183,0.08); color: var(--text2); border: 1px solid rgba(83,74,183,0.18); }
.badge-teal   { background: rgba(15,110,86,0.08); color: var(--text2);  border: 1px solid rgba(15,110,86,0.18);  }
.badge-blue   { background: rgba(24,95,165,0.08); color: var(--text2);  border: 1px solid rgba(24,95,165,0.18);  }
.badge-amber  { background: rgba(133,79,11,0.08); color: var(--text2);  border: 1px solid rgba(133,79,11,0.18);  }
.badge-coral  { background: rgba(153,60,29,0.08); color: var(--text2);  border: 1px solid rgba(153,60,29,0.18);  }
.badge-pink   { background: rgba(153,53,86,0.08); color: var(--text2);  border: 1px solid rgba(153,53,86,0.18);  }

/* Universal step — bolder left treatment */
.scope-step.is-universal .scope-step-icon { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px #1a1a18; }
@media (prefers-color-scheme: dark) { .scope-step.is-universal .scope-step-icon { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px #e8e6de; } }

.scope-expand { overflow: hidden; max-height: 0; transition: max-height 0.28s ease, opacity 0.2s ease; opacity: 0; }
.scope-step.open .scope-expand { max-height: 300px; opacity: 1; }
.scope-expand-inner { padding-top: 7px; }
.scope-note { font-size: 12px; color: var(--text2); line-height: 1.6; }
.scope-chevron { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.25; margin-top: 3px; transition: transform .2s, opacity .2s; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.scope-step.open .scope-chevron { transform: rotate(180deg); opacity: 0.55; }

/* Scope phase */
.scope-phase { margin: 22px 0 0; }
.scope-phase:first-child { margin-top: 0; }
.scope-phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.scope-phase-line { flex: 1; height: 1px; background: var(--border); }
.scope-phase-name { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--purple); white-space: nowrap; opacity: 0.8; }

/* Step count for scope view */
.scope-counts {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
}
.scope-count-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px; background: var(--bg2);
  border: 1px solid var(--border); font-size: 12px; font-weight: 500; color: var(--text2);
}
.scope-count-num { font-weight: 700; color: var(--text); }
</style>
</head>
<body>
<h1>MOD Project Workflows</h1>
<p class="subtitle">A complete view of how MOD works — from first conversation to final delivery.</p>

<div class="mode-row">
  <button class="mode-tab active" id="tab-scope" onclick="setMode('scope')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M12 3a17 17 0 0 1 0 18M12 3a17 17 0 0 0 0 18"/></svg>
    Full Scope View
  </button>
  <button class="mode-tab" id="tab-detail" onclick="setMode('detail')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
    Detailed View Per Project
  </button>
</div>

<div id="scope-view"></div>
<div id="detail-view" style="display:none;">
  <div class="type-row" id="type-row"></div>
  <div class="toggle-bar" id="toggle-bar">
    <button class="toggle-btn active" data-view="internal" onclick="selectView('internal')">Internal</button>
    <button class="toggle-btn" data-view="external" onclick="selectView('external')">External</button>
  </div>
  <div id="detail-panel"></div>
</div>

<script>
// ── ICONS ─────────────────────────────────────────────────────────────────────
const IC = {
  users:    `<svg viewBox="0 0 24 24"><path d="M9 7a4 4 0 1 0 8 0 4 4 0 0 0-8 0"/><path d="M3 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>`,

  layout:   `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>`,
  code:     `<svg viewBox="0 0 24 24"><polyline points="7 8 3 12 7 16"/><polyline points="17 8 21 12 17 16"/><line x1="14" y1="4" x2="10" y2="20"/></svg>`,
  chart_b:  `<svg viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="9" y="8" width="4" height="12" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg>`,
  chart_l:  `<svg viewBox="0 0 24 24"><polyline points="4 19 8 13 12 15 16 10 20 14"/><line x1="4" y1="19" x2="20" y2="19"/></svg>`,

// ── RENDER FULL SCOPE VIEW ────────────────────────────────────────────────────
function renderScopeView() {
  const totalSteps = SCOPE_PHASES.reduce((a,p)=>a+p.steps.length,0);
  const universalCount = SCOPE_PHASES.reduce((a,p)=>a+p.steps.filter(s=>s[3].length===ALL_IDS.length).length,0);
  const specialtyCount = totalSteps - universalCount;

  let html = `
  <div class="scope-intro">
    <p>This view shows every step across all MOD and MODHealth project types in a single unified flow. Steps marked <strong>"All project types"</strong> are the universal backbone present in every project. Steps with specific type badges are specialty steps that apply only to those project types.</p>
    <p>Click any step to reveal more detail.</p>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1a1a18;box-shadow:0 0 0 2px #fff,0 0 0 3.5px #1a1a18"></div> Universal backbone</div>
      ${TYPES.map(t=>`<div class="legend-item"><div class="legend-dot" style="background:var(--${t.color})"></div>${t.label}</div>`).join('')}
    </div>
  </div>
  <div class="scope-counts">
    <div class="scope-count-pill"><span class="scope-count-num">${totalSteps}</span> total steps across all projects</div>
    <div class="scope-count-pill"><span class="scope-count-num">${universalCount}</span> universal to every project</div>
    <div class="scope-count-pill"><span class="scope-count-num">${specialtyCount}</span> specialty steps</div>
  </div>`;

  SCOPE_PHASES.forEach(phase => {
    html += `<div class="scope-phase">
      <div class="scope-phase-header">
        <div class="scope-phase-line"></div>
        <div class="scope-phase-name">${phase.name}</div>
        <div class="scope-phase-line"></div>
      </div>
      <div class="steps">`;

    phase.steps.forEach((s, si) => {
      const [iconKey, label, detail, typeIds] = s;
      const isUniversal = typeIds.length === ALL_IDS.length;
      const isLast = si === phase.steps.length - 1;
      const iconBg = isUniversal ? '#1a1a18' : `var(--${TYPES.find(t=>t.id===typeIds[0])?.color||'purple'}-light)`;
      const iconStroke = isUniversal ? '#fff' : `var(--${TYPES.find(t=>t.id===typeIds[0])?.color||'purple'})`;
      const lineColor = isUniversal ? '#ccc' : `var(--${TYPES.find(t=>t.id===typeIds[0])?.color||'purple'}-mid)`;
      const universalClass = isUniversal ? ' is-universal' : '';

      html += `<div class="scope-step${universalClass}" onclick="toggleScopeStep(this)">
        <div class="scope-step-spine">
          <div class="scope-step-icon" style="background:${iconBg};${isUniversal?'box-shadow:0 0 0 2px var(--bg),0 0 0 4px #1a1a18':''}">
            <svg viewBox="0 0 24 24" style="fill:none;stroke:${iconStroke};stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;width:15px;height:15px;">${IC[iconKey].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
          </div>
          ${!isLast ? `<div class="scope-step-line" style="background:${lineColor}"></div>` : ''}
        </div>
        <div class="scope-step-body">
          <div class="scope-step-trigger">
            <div>
              <div class="scope-step-label${isUniversal?' universal':''}">${label}</div>
              <div class="type-badges">${badges(typeIds)}</div>
            </div>
            ${chevSVG}
          </div>
          <div class="scope-expand"><div class="scope-expand-inner"><div class="scope-note">${detail}</div></div></div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('scope-view').innerHTML = html;
}

// ── DETAILED VIEW BUILDERS ────────────────────────────────────────────────────
let stepCounter = 0;
const COLOR_MAP = { overarching:'col-purple', print:'col-teal', web:'col-blue', email:'col-amber', postprod:'col-coral', live:'col-pink' };
const ACCENT_MAP = { overarching:'#534AB7', print:'#0F6E56', web:'#185FA5', email:'#854F0B', postprod:'#993C1D', live:'#993556' };

function phase(label) {
  return `<div class="phase-block"><div class="phase-header"><div class="phase-line"></div><div class="phase-name">${label}</div><div class="phase-line"></div></div>`;
}
function endPhase() { return `</div>`; }

function step(iconKey, label, detail, opt) {
  stepCounter++;
  const optHtml = opt ? ` <span class="opt">(${opt})</span>` : '';
  const hasDetail = !!detail;
  const detailHtml = hasDetail ? `<div class="step-expand"><div class="step-expand-inner"><div class="step-note">${detail}</div></div></div>` : '';
  return `<div class="step" onclick="toggleStep(this)" style="cursor:${hasDetail?'pointer':'default'}">
    <div class="step-spine"><div class="step-icon-wrap">${ic(iconKey)}</div><div class="step-line"></div></div>
    <div class="step-body">
      <div class="step-trigger"><div class="step-label">${label}${optHtml}</div>${hasDetail?chevSVG2:''}</div>
      ${detailHtml}
    </div>
  </div>`;
}
function lastStep(iconKey, label, detail, opt) {
  stepCounter++;
  const optHtml = opt ? ` <span class="opt">(${opt})</span>` : '';
  const hasDetail = !!detail;
  const detailHtml = hasDetail ? `<div class="step-expand"><div class="step-expand-inner"><div class="step-note">${detail}</div></div></div>` : '';
  return `<div class="step" onclick="toggleStep(this)" style="cursor:${hasDetail?'pointer':'default'}">
    <div class="step-spine"><div class="step-icon-wrap">${ic(iconKey)}</div></div>
    <div class="step-body">
      <div class="step-trigger"><div class="step-label">${label}${optHtml}</div>${hasDetail?chevSVG2:''}</div>
      ${detailHtml}
    </div>
  </div>`;
}
function sub(items) {
  return '<div class="sub-steps">'+items.map(([t,o])=>`<div class="sub-step"><div class="sub-dot"></div><div class="sub-label">${t}${o?` <span class="opt">(${o})</span>`:''}</div></div>`).join('')+'</div>';
}
function stepWithSub(iconKey, label, note, subItems) {
  stepCounter++;
  const noteHtml = note ? `<p style="font-size:12px;color:var(--text2);margin-bottom:6px;line-height:1.5;">${note}</p>` : '';
  return `<div class="step" onclick="toggleStep(this)" style="cursor:pointer">
    <div class="step-spine"><div class="step-icon-wrap">${ic(iconKey)}</div><div class="step-line"></div></div>
    <div class="step-body">
      <div class="step-trigger"><div class="step-label">${label}</div>${chevSVG2}</div>
      <div class="step-expand"><div class="step-expand-inner">${noteHtml}${sub(subItems)}</div></div>
    </div>
  </div>`;
}

function buildDetailPanel(id) {
  stepCounter = 0;
  let h = '';
  if (id==='overarching-internal') {
    h+=phase('Initiation');
    h+=step('users','Client meeting / request','Initial discovery meeting to understand scope, goals, timelines, and any existing brand guidelines or assets.');
    h+=step('file','Proposal & estimate development / approval','Internal team scopes the project and prepares a cost estimate. Sent to client for sign-off before work begins.');
    h+=endPhase();
    h+=phase('Planning');
    h+=stepWithSub('calendar','Planning / strategy','Internal project intake & setup — varies by project type:',[['Tech assessment','web'],['Backend setup','web'],['VO auditions','post-production video'],['Concepting','print/digital/email'],['Reference materials gathering','print/digital/email']]);
    h+=endPhase();
    h+=phase('Production');
    h+=stepWithSub('pencil','Production + client review','Rounds of review (R1, R2, R3…) continue until client approval — varies by project type:',[['Copywriting / design','print/digital'],['Editing / animation','video'],['Client review',''],['VO recording','re-records as needed'],['Wireframe / UX','web'],['Development staging','web'],['Litmus testing','email']]);
    h+=endPhase();
    h+=phase('Delivery');
    h+=step('check','Client approval','Final sign-off. Triggers finishing work: analytics/CMS setup, attestation, shipping, ADA remediation, Salesforce deployment as applicable.');
    h+=step('package','Final files delivered','All production-ready assets organized and transferred to the client.');
    h+=step('receipt','Final billing','Invoice issued based on approved estimate plus any approved scope changes.');
    h+=lastStep('archive','Project closed','Project officially closed. All files archived.');
    h+=endPhase();
  }

// ── DETAILED VIEW RENDER ──────────────────────────────────────────────────────
const DETAIL_TABS = [
  { type:'overarching', label:'Overarching flow', icon:'layers',   hasToggle:false },
  { type:'print',       label:'Print & digital',  icon:'printTab', hasToggle:true  },
  { type:'web',         label:'Web',              icon:'globe',    hasToggle:true  },
  { type:'email',       label:'Email',            icon:'mail',     hasToggle:true  },
  { type:'postprod',    label:'Post-prod video',  icon:'film',     hasToggle:true  },
  { type:'live',        label:'Live shoot',       icon:'camera',   hasToggle:true  },
];

let currentType = 'overarching', currentView = 'internal';

function renderDetailTabs() {
  document.getElementById('type-row').innerHTML = DETAIL_TABS.map(t=>`
    <button class="type-tab${t.type===currentType?' active':''}" data-type="${t.type}" onclick="selectType('${t.type}')">
      ${IC[t.icon]} ${t.label}
    </button>`).join('');
}

function renderDetailPanel() {
  const panelId = currentType==='overarching' ? 'overarching-internal' : `${currentType}-${currentView}`;
  const colClass = COLOR_MAP[currentType];
  const accent = ACCENT_MAP[currentType];
  const {html: stepsHtml, count} = buildDetailPanel(panelId);
  const titles = {
    'overarching-internal':['Overarching MOD/MODHealth project flow','High-level master process covering all project types'],
    'print-internal':['Print & digital — internal','Task-based workflow'],'print-external':['Print & digital — external','Status-based workflow'],
    'web-internal':['Web — internal',''],'web-external':['Web — external',''],
    'email-internal':['Email — internal',''],'email-external':['Email — external',''],
    'postprod-internal':['Post-production video — internal',''],'postprod-external':['Post-production video — external',''],
    'live-internal':['Live shoot — internal',''],'live-external':['Live shoot — external',''],
  };
  const [title, sub_] = titles[panelId]||['',''];
  document.getElementById('detail-panel').innerHTML = `
    <div class="panel-wrap ${colClass}" style="--accent-color:${accent}">
      <div class="flow-header">
        <div class="flow-header-text">
          <div class="flow-title">${title}</div>
          ${sub_?`<div class="flow-sub">${sub_}</div>`:''}
        </div>
        <div class="step-count">
          <div class="step-count-num">${count}</div>
          <div class="step-count-label">steps</div>
        </div>
      </div>
      <div class="steps">${stepsHtml}</div>
    </div>`;
}

function selectType(type) {
  currentType=type; currentView='internal';
  renderDetailTabs();
  const tab = DETAIL_TABS.find(t=>t.type===type);
  const bar = document.getElementById('toggle-bar');
  if (tab?.hasToggle) { bar.classList.add('visible'); document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='internal')); }
  else { bar.classList.remove('visible'); }
  renderDetailPanel();
}

function selectView(view) {
  currentView=view;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  renderDetailPanel();
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
function setMode(mode) {
  document.getElementById('tab-scope').classList.toggle('active', mode==='scope');
  document.getElementById('tab-detail').classList.toggle('active', mode==='detail');
  document.getElementById('scope-view').style.display = mode==='scope' ? '' : 'none';
  document.getElementById('detail-view').style.display = mode==='detail' ? '' : 'none';
}

// ── TOGGLE INTERACTIONS ───────────────────────────────────────────────────────
function toggleStep(el) { const e=el.querySelector('.step-expand'); if(e) el.classList.toggle('open'); }
function toggleScopeStep(el) { const e=el.querySelector('.scope-expand'); if(e) el.classList.toggle('open'); }

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderScopeView();
  renderDetailTabs();
  renderDetailPanel();
});
</script>
